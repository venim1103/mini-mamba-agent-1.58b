[pytest]
testpaths = tests
# Suppress the torch.jit.script_method deprecation warning emitted by the
# PyTorch JIT internals on import of mamba-ssm. This is a third-party issue
# unrelated to project code and creates noise in the test output.
# Suppress SWIG-generated code warnings from sentencepiece library.
filterwarnings =
    ignore::DeprecationWarning:torch.jit._script
    ignore::DeprecationWarning:importlib._bootstrap
    ignore:builtin type.*no __module__
